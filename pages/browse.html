<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Browse All Resources - Academic Resort</title>
    <link rel="preconnect" href="https://www.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
    <script src="../assets/config.js" defer></script>
    <script src="../assets/drive-manager.js" defer></script>
    <script src="../assets/search-engine.js" defer></script>
    <script src="../assets/display-manager.js" defer></script>
  </head>
  <body>
    <div data-include="../assets/includes/sidebar.html"></div>
    <header class="app-header"><h1>Academic Resort</h1></header>
    <main class="container">
      <div class="page-intro">
        <h1 class="page-title">Browse All Resources</h1>
        <p>
          <b
            >Search and filter through all academic resources across all
            semesters and batches.</b
          >
        </p>
      </div>

      <!-- Advanced Search/Filter -->
      <div class="search-panel">
        <div class="search-row">
          <input
            type="text"
            id="globalSearch"
            placeholder="Search something..."
            oninput="debounce(() => searchEngine.optimizedSearch(), 500)()"
          />
        </div>

        <div class="filter-row">
          <select
            id="semesterFilter"
            onchange="searchEngine.handleFilterChange()"
          >
            <option value="">All Semesters</option>
            <option value="1st">1st Semester</option>
            <option value="2nd">2nd Semester</option>
            <option value="3rd">3rd Semester</option>
            <option value="4th">4th Semester</option>
            <option value="5th">5th Semester</option>
            <option value="6th">6th Semester</option>
            <option value="7th">7th Semester</option>
            <option value="8th">8th Semester</option>
          </select>

          <select id="batchFilter" onchange="searchEngine.handleFilterChange()">
            <option value="">All Batches</option>
            <option value="30">30th Batch</option>
            <option value="29">29th Batch</option>
            <option value="28">28th Batch</option>
            <option value="27">27th Batch</option>
            <option value="26">26th Batch</option>
          </select>
        </div>
      </div>

      <!-- Results Container -->
      <div id="results-container">
        <div class="results-header">
          <div class="results-stats" id="resultsStats">
            Loading resources...
          </div>

          <!-- Accordion Controls -->
          <div
            class="accordion-controls"
            id="accordionControls"
            style="display: none"
          >
            <button
              class="control-btn"
              onclick="displayManager.expandAllSemesters()"
              title="Expand all semesters"
            >
              ðŸ“‚ Expand All
            </button>
            <button
              class="control-btn"
              onclick="displayManager.collapseAllSemesters()"
              title="Collapse all semesters"
            >
              ðŸ“ Collapse All
            </button>
            <button
              class="control-btn"
              onclick="displayManager.collapseAllBatches()"
              title="Collapse all batches"
            >
              ðŸ—‚ï¸ Minimize Batches
            </button>
          </div>
        </div>

        <!-- All Drive Resources will be loaded here -->
        <div id="all-resources"></div>
      </div>
    </main>

    <div data-include="../assets/includes/footer.html"></div>

    <script>
      // Simple bootstrap for the unified modular system
      (function () {
        // Wait for all scripts to load
        function init() {
          if (
            !window.SiteConfig ||
            !window.DriveManager ||
            !window.SearchEngine ||
            !window.DisplayManager
          ) {
            setTimeout(init, 100);
            return;
          }

          try {
            // Initialize Drive Manager
            window.driveManager = new DriveManager();
            window.driveManager.init();

            // Initialize Search Engine
            window.searchEngine = new SearchEngine(window.driveManager);

            // Initialize Display Manager
            window.displayManager = new DisplayManager(window.driveManager);

            // Initialize stats
            const statsElement = document.getElementById("resultsStats");
            if (statsElement) {
              statsElement.textContent =
                "Ready! Enter search terms to find resources.";
            }

            console.log("âœ… Browse page initialized successfully");
            console.log(
              "ðŸ’¡ Available globals: driveManager, searchEngine, displayManager"
            );
          } catch (error) {
            console.error("âŒ Failed to initialize browse page:", error);
          }
        }

        // Start initialization
        init();
      })();
    </script>
  </body>
</html>
